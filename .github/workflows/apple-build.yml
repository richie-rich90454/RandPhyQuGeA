name: iOS/macOS Build

on:
  push:
    branches: [main]
    paths:
      - 'physics_app/ios/**'
      - 'physics_app/macos/**'
      - 'physics_app/lib/**'
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'
      - name: Build iOS
        run: |
          cd physics_app
          flutter build ios --release --no-codesign

  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'
      - name: Build macOS
        run: |
          cd physics_app
          flutter build macos --release