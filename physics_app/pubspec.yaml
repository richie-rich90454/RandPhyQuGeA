name: physics_app
description: Physics Question Generator - Cross-platform with Flutter + Rust
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  flutter_math_fork: ^0.7.2
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/part_one.txt